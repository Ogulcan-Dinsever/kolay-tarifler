workflows:
  ios-testflight:
    name: Kolay Tarifler - iOS TestFlight
    # Cost guard: a single manually started build may consume at most 60 of the
    # 500 free monthly macOS M2 minutes. Do not add automatic triggers here.
    max_build_duration: 60
    instance_type: mac_mini_m2

    inputs:
      ios_marketing_version:
        description: App Store Connect version for this build
        type: string
        default: "1.0"
      use_test_ads:
        description: Use Google test ads for TestFlight; set false only for App Store review
        type: string
        default: "true"

    environment:
      groups:
        - appstore_credentials
      flutter: 3.44.6
      xcode: 26.4
      cocoapods: 1.16.2
      node: 22
      java: 21
      vars:
        APP_STORE_APPLE_ID: "6790800121"
        BUNDLE_ID: "com.kolaytarifler.app"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Validate required iOS configuration
        script: |
          set -e
          test -f ios/Runner/GoogleService-Info.plist
          test -f ios/Runner/Runner.entitlements
          grep -q "com.kolaytarifler.app" ios/Runner.xcodeproj/project.pbxproj
          grep -q "ADMOB_APP_ID=ca-app-pub-" ios/Flutter/Release.xcconfig
          grep -q "<key>aps-environment</key>" ios/Runner/Runner.entitlements
          grep -q "<key>com.apple.developer.applesignin</key>" ios/Runner/Runner.entitlements

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Analyze source
        script: flutter analyze

      - name: Run tests
        script: flutter test

      - name: Install Cloud Functions dependencies
        script: npm --prefix functions ci

      - name: Test notification functions
        script: npm --prefix functions test

      - name: Test Firestore security rules
        script: npm --prefix functions run test:rules

      - name: Initialize iOS signing keychain
        script: keychain initialize

      - name: Fetch or create App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add signing certificate to keychain
        script: keychain add-certificates

      - name: Set up App Store code signing
        script: xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build signed IPA
        script: |
          set -e
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || true)
          case "$LATEST_BUILD_NUMBER" in
            '') LATEST_BUILD_NUMBER=0 ;;
            *[!0-9]*) echo "Invalid TestFlight build number: $LATEST_BUILD_NUMBER" >&2; exit 1 ;;
          esac
          BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          # TestFlight testçileri canlı reklamlara tıklayarak geçersiz trafik
          # oluşturmamalı. App Store inceleme derlemesinde use_test_ads=false
          # seçilir ve uygulamadaki canlı iOS reklam birimi kullanılır.
          case "${{ inputs.use_test_ads }}" in
            true)
              # Keep the app-level and unit-level identifiers in the same test
              # environment. A live app registration must not gate test ads.
              /usr/bin/sed -i.bak \
                's#^ADMOB_APP_ID=.*#ADMOB_APP_ID=ca-app-pub-3940256099942544~1458002511#' \
                ios/Flutter/Release.xcconfig
              ;;
            false) ;;
            *) echo "use_test_ads must be true or false" >&2; exit 1 ;;
          esac
          if [ "${{ inputs.use_test_ads }}" = "true" ]; then
            flutter build ipa --release \
              --build-name="${{ inputs.ios_marketing_version }}" \
              --build-number="$BUILD_NUMBER" \
              --dart-define=ADMOB_USE_TEST_ADS=true \
              --export-options-plist=/Users/builder/export_options.plist
          else
            flutter build ipa --release \
              --build-name="${{ inputs.ios_marketing_version }}" \
              --build-number="$BUILD_NUMBER" \
              --export-options-plist=/Users/builder/export_options.plist
          fi

          APP_INFO_PLIST=$(find build/ios/archive \
            -path '*/Products/Applications/*.app/Info.plist' -print -quit)
          test -n "$APP_INFO_PLIST"
          BUILT_ADMOB_APP_ID=$(/usr/bin/plutil -extract GADApplicationIdentifier raw "$APP_INFO_PLIST")
          if [ "${{ inputs.use_test_ads }}" = "true" ]; then
            test "$BUILT_ADMOB_APP_ID" = "ca-app-pub-3940256099942544~1458002511"
          else
            test "$BUILT_ADMOB_APP_ID" = "ca-app-pub-1746933154428344~1390665338"
          fi
          echo "Verified archived AdMob app ID: $BUILT_ADMOB_APP_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: false
