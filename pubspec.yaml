name: kolay_tarifler
description: "Kolay Tarifler — Türk ve dünya mutfaklarından tarif uygulaması"
publish_to: 'none'

version: 1.1.2+7

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Firebase ---
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_crashlytics: ^4.3.0
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2
  # Apple girişi Firebase Auth'un yerel AppleAuthProvider akışıyla sağlanır.

  # --- Notifications ---
  flutter_local_notifications: ^18.0.1

  # --- State Management ---
  flutter_riverpod: ^2.6.1

  # --- Navigation ---
  go_router: ^14.8.1

  # --- UI ---
  cached_network_image: ^3.4.1
  table_calendar: ^3.1.3
  intl: ^0.20.2 # takvim Turkce ay/gun adlari (initializeDateFormatting)

  # --- Local Storage ---
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  google_mobile_ads: ^9.0.0
  app_tracking_transparency: ^2.0.7
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  fake_cloud_firestore: ^3.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#F5F0EB"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
